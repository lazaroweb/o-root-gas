name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  vitest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        projeto: [forja, forja-public]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.projeto }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.projeto }}
      - run: npm test
        working-directory: ${{ matrix.projeto }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.projeto }}
      # Exercita a injeção cross-project do esbuild (forja-public lê
      # ../forja/src/lib/*.ts direto do checkout — não precisa do build do
      # forja antes, só do fonte; por isso a matrix segue paralela, sem needs).
      - run: npm run build
        working-directory: ${{ matrix.projeto }}
