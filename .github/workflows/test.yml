name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: forja/package-lock.json
      - run: npm ci
        working-directory: forja
      - run: npm test
        working-directory: forja
